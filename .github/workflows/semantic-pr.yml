name: Semantic PR

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions: {}

jobs:
  semantic-pr:
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    if: github.repository == 'awdr74100/vite-plugin-vue-middleware' && !startsWith(github.head_ref, 'v')
    runs-on: ubuntu-slim
    name: Validate PR title
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        with:
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            doesn't start with an uppercase character.

            Examples:
              ✅ chore(ui): fix button spacing
              ✅ docs: update README
              ❌ chore(ui): Fix button spacing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
